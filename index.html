<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>紹介ページ</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f0f0f0;
      }
      .container {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      img {
        width: 120px;
        border-radius: 50%;
        margin-top: 10px;
      }
      button {
        padding: 10px 20px;
        background: #4caf50;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #45a049;
      }
      a {
        color: #4caf50;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      a:hover {
        text-decoration: underline;
      }
      .phone-icon {
        width: 20px; /* アイコンのサイズを調整 */
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>こんにちは、平野です</h1>
      <img src="profile.png" alt="profile picture" />
      <p>ゲームが好きです</p>
      <button onclick="location.href='mailto:harukihirano@outlook.jp'">
        追加する
      </button>
      <p>
        <a href="tel:+81123456789">
          <img
            src="https://img.icons8.com/ios-filled/50/000000/phone.png"
            alt="電話"
            class="phone-icon"
          />
          +81-1234-56789
        </a>
      </p>
    </div>
  </body>
</html>
