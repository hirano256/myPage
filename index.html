<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>自己紹介ページ</title>
    <link rel="stylesheet" href="style.css" />
    <script>
      function copyToClipboard(id) {
        navigator.clipboard.writeText(id).then(
          function () {
            alert("IDがコピーされました: " + id);
          },
          function () {
            alert("コピーに失敗しました");
          }
        );
      }
    </script>
  </head>
  <body>
    <div class="container">
      <h1>自己紹介ページ</h1>
      <img src="ムキムキ.gif" alt="profile picture" />
      <p>ゲームID一覧</p>
      <div class="game-id-group">
        <div class="game-id">
          <img
            src="https://img.icons8.com/ios-filled/50/000000/brawl-stars.png"
            alt="ブロスタ"
            class="game-icon"
          />
          <span>ブロスタ: hirano256</span>
          <button class="copy-button" onclick="copyToClipboard('hirano256')">
            コピー
          </button>
        </div>
        <div class="game-id">
          <img src="銃.gif" alt="Fortnite" class="game-icon" />
          <span>Fortnite: hira_256</span>
          <button class="copy-button" onclick="copyToClipboard('hira_256')">
            コピー
          </button>
        </div>
        <div class="game-id">
          <img
            src="https://img.icons8.com/ios-filled/50/000000/pokemon-go.png"
            alt="Pokémon GO"
            class="game-icon"
          />
          <span>Pokémon GO: 194844899338</span>
          <button class="copy-button" onclick="copyToClipboard('194844899338')">
            コピー
          </button>
        </div>
      </div>
      <div class="contact-info">
        <button
          class="button"
          onclick="location.href='mailto:harukihirano@outlook.jp'"
        >
          追加する
        </button>
        <a href="tel:+819039303818" class="button">
          <img
            src="https://img.icons8.com/ios-filled/20/ffffff/phone.png"
            alt="電話"
            class="icon"
          />090-3930-3818
        </a>
        <a href="https://line.me/ti/p/s7w4vxdrdd" class="button">
          <img
            src="https://img.icons8.com/ios-filled/20/ffffff/line-me.png"
            alt="LINE"
            class="icon"
          />友達追加はこちら
        </a>
        <a
          href="https://discordapp.com/users/1001784709979852840"
          class="button"
        >
          <img
            src="https://img.icons8.com/ios-filled/20/ffffff/discord-logo.png"
            alt="Discord"
            class="icon"
          />hira256#6555
        </a>
      </div>
    </div>
  </body>
</html>
