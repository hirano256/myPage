<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Haruki Hirano | Digital Card</title>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f2027;
        color: white;
        overflow: hidden;
      }

      /* 粒子背景 */

      #particles-js {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: -1;
      }

      /* カード */

      .card {
        backdrop-filter: blur(20px);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        padding: 40px;
        width: 340px;
        text-align: center;
        animation: fadeUp 1s ease;
      }

      /* 名前 */

      h1 {
        font-size: 28px;
      }

      .name-jp {
        font-size: 18px;
        opacity: 0.8;
        margin-bottom: 5px;
      }

      .subtitle {
        opacity: 0.7;
        margin-bottom: 25px;
        font-size: 14px;
      }

      /* セクション */

      .section h2 {
        font-size: 16px;
        margin-bottom: 10px;
        opacity: 0.8;
      }

      /* ボタン */

      .btn {
        display: block;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 12px;
        margin-top: 10px;
        border-radius: 10px;
        transition: all 0.3s;
      }

      .btn:hover {
        transform: translateY(-3px);
        background: rgba(255, 255, 255, 0.25);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      }

      /* カードアニメーション */

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div id="particles-js"></div>

    <div class="card">
      <p class="roman">ひらの　はるき</p>
      <h1 class="kanji">平野 晴己</h1>
      <p class="subtitle">名古屋市立久方中学校3年生(14歳)</p>

      <div class="section">
        <h2>Contact</h2>

        <a href="mailto:haruyuu0912@gmail.com" class="btn"> Email </a>

        <a href="tel:+819039303818" class="btn"> Phone : 090-3930-3818 </a>

        <a href="https://line.me/ti/p/s7w4vxdrdd" class="btn"> LINE </a>

        <a href="https://discordapp.com/users/1001784709979852840" class="btn">Discord</a>

       <a href="https://www.instagram.com/hira_2560?igsh=MTdkN3g5MTdxcTNzNg%3D%3D&utm_source=qr" class="btn">Instagram</a>

       <a href="contact.vcf" class="btn">
連絡先を保存  
</a>
      </div>
    </div>

    <script>
      particlesJS("particles-js", {
        particles: {
          number: { value: 70 },
          color: { value: "#ffffff" },
          shape: { type: "circle" },

          opacity: {
            value: 0.5,
          },

          size: {
            value: 3,
          },

          line_linked: {
            enable: true,
            distance: 150,
            color: "#ffffff",
            opacity: 0.3,
            width: 1,
          },

          move: {
            enable: true,
            speed: 2,
          },
        },

        interactivity: {
          events: {
            onhover: {
              enable: true,
              mode: "repulse",
            },
          },
        },
      });
    </script>
  </body>
</html>
