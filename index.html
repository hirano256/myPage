<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>自己紹介ページ</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap");

      body {
        font-family: "Roboto", sans-serif;
        background: linear-gradient(135deg, #1e1e1e, #2c2c2c);
        color: #fff;
        text-align: center;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 50px auto;
        padding: 30px;
        background: #333;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      }
      img {
        width: 120px;
        border-radius: 50%;
        margin-top: 20px;
        border: 3px solid #fff;
      }
      h1 {
        font-size: 2.5em;
        margin-bottom: 20px;
      }
      p {
        font-size: 1.2em;
        margin-bottom: 30px;
      }
      .game-id-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 30px;
      }
      .game-id {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        background: #444;
        padding: 15px;
        margin: 10px 0;
        border-radius: 8px;
      }
      .game-icon {
        width: 40px;
        margin-right: 15px;
      }
      .game-id span {
        flex-grow: 1;
        text-align: left;
      }
      .copy-button {
        background: #4caf50;
        color: #fff;
        border: none;
        border-radius: 5px;
        padding: 5px 10px;
        cursor: pointer;
        transition: background 0.3s ease;
      }
      .copy-button:hover {
        background: #45a049;
      }
      .button-group {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
      }
      .button,
      a.button {
        background: #4caf50;
        color: #fff;
        border: none;
        border-radius: 5px;
        padding: 10px 20px;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .button:hover,
      a.button:hover {
        background: #45a049;
      }
      .icon {
        width: 20px;
        margin-right: 8px;
      }
      .contact-info {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }
    </style>
    <script>
      function copyToClipboard(id) {
        navigator.clipboard.writeText(id).then(
          function () {
            alert("IDがコピーされました: " + id);
          },
          function () {
            alert("コピーに失敗しました");
          }
        );
      }
    </script>
  </head>
  <body>
    <div class="container">
      <h1>自己紹介ページ</h1>
      <img src="profile.png" alt="profile picture" />
      <p>ゲームID一覧</p>
      <div class="game-id-group">
        <div class="game-id">
          <img
            src="https://img.icons8.com/ios-filled/50/000000/brawl-stars.png"
            alt="ブロスタ"
            class="game-icon"
          />
          <span>ブロスタ: hirano256</span>
          <button class="copy-button" onclick="copyToClipboard('hirano256')">
            コピー
          </button>
        </div>
        <div class="game-id">
          <img
            src="https://img.icons8.com/ios-filled/50/000000/fortnite.png"
            alt="Fortnite"
            class="game-icon"
          />
          <span>Fortnite: hira_256</span>
          <button class="copy-button" onclick="copyToClipboard('hira_256')">
            コピー
          </button>
        </div>
        <div class="game-id">
          <img
            src="https://img.icons8.com/ios-filled/50/000000/pokemon-go.png"
            alt="Pokémon GO"
            class="game-icon"
          />
          <span>Pokémon GO: 194844899338</span>
          <button class="copy-button" onclick="copyToClipboard('194844899338')">
            コピー
          </button>
        </div>
      </div>
      <div class="contact-info">
        <button
          class="button"
          onclick="location.href='mailto:harukihirano@outlook.jp'"
        >
          追加する
        </button>
        <a href="tel:+819039303818" class="button">
          <img
            src="https://img.icons8.com/ios-filled/20/000000/phone.png"
            alt="電話"
            class="icon"
          />090-3930-3818
        </a>
        <a href="https://line.me/R/ti/p/%40YOURID" class="button">
          <img
            src="https://img.icons8.com/ios-filled/20/000000/line-me.png"
            alt="LINE"
            class="icon"
          />友達追加はこちら
        </a>
        <a
          href="https://discordapp.com/users/1001784709979852840"
          class="button"
        >
          <img
            src="https://img.icons8.com/ios-filled/20/000000/discord-logo.png"
            alt="Discord"
            class="icon"
          />hira256#6555
        </a>
      </div>
    </div>
  </body>
</html>
